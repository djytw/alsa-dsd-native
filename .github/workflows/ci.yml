name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: env
      run: sudo apt-get install libasound2-dev
    
    - name: make
      run: make

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        SHA_SHORT=$(git rev-parse --short HEAD)
        gh release create "build-$SHA_SHORT" \
          alsa-dsd-native \
          --title "Build: $SHA_SHORT" \
          --notes "Automated release for commit $SHA_SHORT"
